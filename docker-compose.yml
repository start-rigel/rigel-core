services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rigel-jd-collector:
    build:
      context: ../rigel-jd-collector
    env_file:
      - .env
    environment:
      RIGEL_SERVICE_NAME: rigel-jd-collector
      RIGEL_HTTP_PORT: ${RIGEL_JD_COLLECTOR_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${RIGEL_JD_COLLECTOR_PORT}:${RIGEL_JD_COLLECTOR_PORT}"

  rigel-build-engine:
    build:
      context: ../rigel-build-engine
    env_file:
      - .env
    environment:
      RIGEL_SERVICE_NAME: rigel-build-engine
      RIGEL_HTTP_PORT: ${RIGEL_BUILD_ENGINE_PORT}
      RIGEL_BUILD_ENGINE_ADMIN_TOKEN: ${RIGEL_BUILD_ENGINE_ADMIN_TOKEN}
      RIGEL_INTERNAL_SERVICE_TOKEN: ${RIGEL_INTERNAL_SERVICE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  rigel-console:
    build:
      context: ../rigel-console
    env_file:
      - .env
    environment:
      RIGEL_SERVICE_NAME: rigel-console
      RIGEL_HTTP_PORT: ${RIGEL_CONSOLE_PORT}
      RIGEL_INTERNAL_SERVICE_TOKEN: ${RIGEL_INTERNAL_SERVICE_TOKEN}
    depends_on:
      rigel-build-engine:
        condition: service_started
    ports:
      - "${RIGEL_CONSOLE_PORT}:${RIGEL_CONSOLE_PORT}"

volumes:
  postgres_data:
  redis_data:
